operating_modes:
  normal:
    active_220kv_lines: ["L1", "L2"]
    active_main_transformers: ["T1", "T2"]
    reserved_220kv_lines: ["L3"]
    bus_ties:
      220kv: "open"
      35kv: "open"
      10kv: "open"
      0_4kv: "closed_under_single_transformer_operation"
    station_service_transformers:
      active_count: 1
      standby_count: 1
      rotation: "alternate_by_operation_schedule"
  main_transformer_n_minus_one:
    action_sequence:
      - "isolate_faulted_main_transformer"
      - "close_35kv_bus_tie_only_after_fault_clearance"
      - "curtail_renewable_output_to_no_more_than_180MVA_through_surviving_transformer"
      - "retain_10kv_and_0_4kv_important_loads"
    required_curtailment_percent_baseline: 35.7798
  one_220kv_line_out:
    action: "remaining_line_carries_export_subject_to_LGJ_400_50_temperature_corrected_ampacity"
    full_export_current_a_approx: 735.559
    course_reference_ampacity_at_41c_a: 475.242
    line_only_required_curtailment_percent: 35.390
    interaction_with_main_transformer_n_minus_one: "main_transformer_35_780_percent_curtailment_is_slightly_more_restrictive_and_reduces_line_current_to_about_472_377A"
  220kv_bus_tie_transfer:
    conservative_continuous_duty_a: 735.559
    basis: "one energized section transfers the full pre-curtailment export duty before operating limits are applied"
  auxiliary_source_n_minus_one:
    action_10kv: "isolate_failed_35_10_5kv_source_then_close_10kv_bus_tie_after_fault_clearance"
    full_svg_range_retained: true
    worst_case_transformer_loading_percent: 79.166
    priority: "retain_station_service_control_communications_and_cooling_then_coordinate_svg_output_with_voltage_and_transformer_limits"
    action_0_4kv: "isolate_failed_station_service_incomer_then_close_standby_transformer_incomer_with_0_4kv_bus_tie_remaining_closed"
  prohibited:
    - "parallel_operation_of_system_1_and_system_2_through_220kv_bus_tie_without_dispatch_permission_and_synchrocheck"
    - "parallel_operation_of_two_healthy_main_transformers_through_closed_35kv_bus_tie"
    - "parallel_operation_of_two_healthy_T10_transformers_through_closed_10kv_bus_tie"

