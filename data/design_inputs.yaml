project:
  title: "220kV新能源汇集变电所电气一次部分初步设计"
  taskbook_group: 5
  assignment_start: "2026-07-06"
  assignment_end: "2026-07-17"
  source_status: "confirmed_from_local_taskbook"

submission_requirements:
  technical_design_description: true
  technical_calculation_book: true
  single_line_diagram: true
  switchyard_section_drawing: true
  switchyard_plan_drawing: true
  course_summary_and_defense: true
  document_mode: "generally_handwritten_per_taskbook"
  drawing_mode: "CAD_engineering_base_confirmed_by_user; final_submission_to_be_hand_copied"
  cad_engineering_base_authorized: true
  final_hand_copy_required: true

system:
  voltage_levels_kv: [220, 35, 10, 0.4]
  main_transformer_proposal:
    count: 2
    rated_capacity_mva_each: 180
    installation: "outdoor_oil_immersed_on_load_tap_changing"
    winding_scheme: "220_35_two_winding_plus_two_35_10_5kv_source_transformers"
  auxiliary_transformer_proposal:
    count: 2
    rated_capacity_mva_each: 31.5
    voltage_ratio_kv: [35, 10.5]
    short_circuit_voltage_percent: 8
    installation: "oil_immersed_power_transformer"
    evidence_class: "course_design_assumption_supported_by_official_standard_metadata_and_manufacturer_catalog"
  outgoing_220kv:
    in_service_circuits: 2
    reserved_circuits: 1
    conductor: "LGJ-400/50"
    direction: "northwest"
    conductor_ampacity_course_reference:
      reference_ambient_temperature_c: 25
      maximum_conductor_temperature_c: 70
      reference_ampacity_a: 592
      project_ambient_temperature_c: 41
      correction_formula: "sqrt((theta_allow-theta_project)/(theta_allow-theta_reference))"
      evidence_status: "legacy_GB1179_83_secondary_table_course_conservative_reference"
      final_engineering_status: "pending_current_manufacturer_thermal_rating_with_weather_conditions"
  collector_35kv:
    in_service_circuits: 12
    reserved_circuits: 2
    line_type: "mixed_overhead_and_cable"
    directions: ["east", "south"]
  auxiliary_10kv:
    purposes: ["station_service", "reactive_compensation", "cooling", "auxiliary_systems", "backup_supply"]
    direction: "within_station_and_backup_source"

system_sources:
  base_capacity_mva: 100
  source_1:
    equivalent_capacity_mva: 2400
    reactance_pu_on_own_base: 0.40
    line_length_km: 70
  source_2:
    equivalent_capacity_mva: 2000
    reactance_pu_on_own_base: 0.45
    line_length_km: 85
  future_or_tie_line:
    line_length_km: 60
    in_service_for_base_case: false
    status: "sensitivity_case_pending_final_operating_mode"

loads_35kv:
  simultaneous_output_factor: 0.95
  total_installed_active_power_mw: 270
  items:
    - {name: "wind_farm_A", label_zh: "风电场A", active_power_mw: 80, power_factor: 0.95, circuits: 4}
    - {name: "wind_farm_B", label_zh: "风电场B", active_power_mw: 60, power_factor: 0.95, circuits: 3}
    - {name: "pv_plant_A", label_zh: "光伏电站A", active_power_mw: 60, power_factor: 0.98, circuits: 2}
    - {name: "pv_plant_B", label_zh: "光伏电站B", active_power_mw: 40, power_factor: 0.98, circuits: 2}
    - {name: "energy_storage", label_zh: "储能电站", active_power_mw: 30, power_factor: 0.95, circuits: 1}

loads_10kv:
  simultaneity_factor: 0.80
  items:
    - {name: "station_service_backup", label_zh: "站用电备用电源", active_power_mw: 0.8, power_factor: 0.85, circuits: 1}
    - {name: "reactive_compensation_and_cooling", label_zh: "无功补偿及冷却系统", active_power_mw: 0.6, power_factor: 0.85, circuits: 1}
    - {name: "control_communications_and_monitoring", label_zh: "集控通信及监控系统", active_power_mw: 0.4, power_factor: 0.90, circuits: 1}
  reactive_compensation:
    status: "provisional_frozen_for_course_design"
    technology: "dynamic_svg"
    target_power_factor: 0.98
    inverter_reactive_headroom_credited: false
    selected_total_mvar: 24
    selected_dynamic_range_mvar: [-24, 24]
    units:
      - {id: "SVG-1", source_section: "10kV-I", rated_mvar: 12, rated_range_mvar: [-12, 12]}
      - {id: "SVG-2", source_section: "10kV-II", rated_mvar: 12, rated_range_mvar: [-12, 12]}
    control_modes: ["voltage", "reactive_power", "power_factor"]
    harmonic_study_status: "pending_final_special_study"
    exact_vendor_model_status: "pending"
    assumption_note: "Taskbook omits Mvar; selected from project P-Q calculation with conservative 10kV auxiliary-load inclusion."

station_service_loads:
  low_voltage_system: "380_220V_three_phase_four_wire"
  bus_scheme: "single_bus_sectionalized"
  transformer_count_preference: 2
  standby_mode: "dark_standby"
  normal_operation: "one_transformer_in_service_bus_tie_closed_other_transformer_dark_standby"
  capacity_rule: "each_transformer_supplies_all_frequent_loads_plus_about_10_percent_margin"
  preliminary_selection_assumptions:
    power_factor: 0.80
    margin_rate: 0.10
    standard_capacity_kva: [100, 125, 160, 200, 250, 315]
  items:
    - {name: "main_transformer_fans", rated_kw_formula: "n*66*0.15", calculated_rated_kw: 19.8, duty: "continuous_frequent", applicable: true}
    - {name: "main_battery_charger", rated_kw: 20, duty: "continuous_infrequent", applicable: true}
    - {name: "float_charger", rated_kw: 14, duty: "continuous_frequent", applicable: true}
    - {name: "battery_ventilation", rated_kw: 1.4, duty: "continuous_infrequent", applicable: true}
    - {name: "battery_exhaust", rated_kw: 1.7, duty: "continuous_infrequent", applicable: true}
    - {name: "domestic_and_fire_water_pump", rated_kw: 1.7, duty: "continuous_frequent", applicable: true}
    - {name: "air_compressors", rated_kw_formula: "2*22", calculated_rated_kw: 44, simultaneous_kw: 22, duty: "short_time_frequent", applicable: true}
    - {name: "carrier_and_communications", rated_kw: 1.7, duty: "continuous_frequent", applicable: true}
    - {name: "220kv_switchyard_supply", rated_kw: 20, duty: "short_time_infrequent", applicable: true}
    - {name: "110kv_switchyard_supply", rated_kw: 20, duty: "short_time_infrequent", applicable: false, reason: "no_110kv_level_in_this_project"}
    - {name: "35kv_switchgear_supply", rated_kw: 10, duty: "short_time_infrequent", applicable: true}
    - {name: "220kv_breaker_winter_heating", rated_kw: 6, duty: "continuous", applicable: true}
    - {name: "110kv_breaker_winter_heating", rated_kw: 10, duty: "continuous", applicable: false, reason: "no_110kv_level_in_this_project"}
    - {name: "outdoor_switchyard_lighting", rated_kw: 20, duty: "continuous", applicable: true}
    - {name: "indoor_lighting", rated_kw: 10, duty: "continuous", applicable: true}
    - {name: "maintenance_and_spare", rated_kw: 15, duty: "short_time_infrequent", applicable: true}

natural_conditions:
  maximum_temperature_c: 41
  minimum_temperature_c: -12
  annual_average_temperature_c: 15
  altitude_m: 1000
  altitude_basis: "course_design_assumption_as_normal_service_upper_limit"
  pollution_level: "d"
  pollution_basis: "conservative_heavy_pollution_course_design_assumption"

calculation_rules:
  line_loss_rate: 0.05
  annual_growth_rate_for_sensitivity: 0.04
  short_circuit_base_mva: 100
  short_circuit_peak_factor_k: 1.8
  average_rated_voltage_kv:
    220kv: 230
    35kv: 37
    10kv: 10.5
  line_reactance_ohm_per_km:
    220kv_overhead: 0.40
    35kv: 0.35
    10kv_cable: 0.08
    10kv_overhead_range: [0.35, 0.40]
  preliminary_short_circuit_resistance: "ignored"
  main_transformer_short_circuit_voltage_percent:
    220_35_two_winding: 14
    35_10_5_distribution_transformer: 8
  grounding:
    220kv: "direct_grounding"
    35kv: "grounding_transformer_plus_low_resistance_course_assumption"
    10kv: "grounding_transformer_plus_low_resistance_course_assumption"
  renewable_short_circuit_contribution:
    base_case: "ignored"
    sensitivity_case: "1.1_to_1.2_times_rated_current"
    sensitivity_multiplier_range: [1.1, 1.2]
  protection_and_breaker_times:
    main_protection_operating_s: 0.05
    backup_protection_operating_s: 1.00
    breaker_intrinsic_opening_s: 0.04
    breaker_total_clearing_s: 0.08
    contact_separation_s: 0.09
    thermal_equivalent_duration_s: 1.10
    evidence_class: "course_design_assumption_pending_final_protection_coordination_and_exact_breaker_model"
  switchyard_clearances_220kv_outdoor_mm:
    A1_phase_to_earth: 1800
    A2_phase_to_phase: 2000
    B1_live_to_rail_barrier: 2550
    B2_live_to_mesh_barrier: 1900
    C_unfenced_live_to_ground: 4300
    D_non_simultaneous_maintenance_or_structure: 3800
    source: "course_chapter_7_table_7_2_page_13_220J_column"
    final_standard_review: "DL_T_5352_2018_full_text_required_for_construction_use"

