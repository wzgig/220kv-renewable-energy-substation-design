  - {id: "N-02", label: "L3为预留且方案待确认的远期回路，按预留线型绘制。"}
  - {id: "N-03", label: "220kV分段正常断开；仅调度许可且同期检查通过后条件闭合。"}
  - {id: "N-04", label: "35kV及10kV母联正常断开，仅在故障侧隔离并清除后投入。"}
  - {id: "N-05", label: "10kV每段设1套±12Mvar SVG；T10为2×31.5MVA、35/10.5kV、uk=8%。"}
  - {id: "N-06", label: "0.4kV母联正常闭合；图示TS1运行、TS2暗备用，运行计划可轮换。"}
  - {id: "N-07", label: "0.4kV两进线设联锁，正常及切换过程不得同时闭合。"}
  - {id: "N-08", label: "海拔≤1000m、污秽d级、保护与接地方式为课程设计假设，教师或专题资料优先覆盖。"}
