plan:
  drawing_id: "LAY-220-01"
  drawing_title: "220kV户外AIS配电装置平面布置图"
  sheet: {format: "A1", orientation: "landscape", width: 841, height: 594, scale: 200, scale_label: "1:200"}
  paper_origin_mm: [45, 90]
  site_boundary_m: [0, 0, 145, 90]
  fence_inset_m: 2
  ais_area_m: [8, 16, 137, 85]
  roads:
    - {id: "perimeter-road", bounds_m: [5, 5, 140, 85], width_m: 4, kind: "loop"}
    - {id: "transformer-road", bounds_m: [34, 19, 104, 23], width_m: 4, kind: "straight"}
  bus_sections:
    - {id: "BUS-220-I", section: "220kV-I", x_m: [10, 60], center_y_m: 55}
    - {id: "BUS-220-II", section: "220kV-II", x_m: [74, 135], center_y_m: 55}
  bus_tie: {id: "220-BS", x_m: [60, 74], center_y_m: 55, normal_state: "open"}
  line_bays:
    - {id: "L1", section: "220kV-I", center_x_m: 18, bus_y_m: 55, gantry_y_m: 84, status: "in_service", direction: "northwest", label: "系统1线路 L1\n70km LGJ-400/50"}
    - {id: "L2", section: "220kV-II", center_x_m: 109, bus_y_m: 55, gantry_y_m: 84, status: "in_service", direction: "northwest", label: "系统2线路 L2\n85km LGJ-400/50"}
    - {id: "L3", section: "220kV-II", center_x_m: 123, bus_y_m: 55, gantry_y_m: 84, status: "reserved", direction: "northwest", label: "预留线路 L3\n60km LGJ-400/50"}
  transformer_bays:
    - {id: "T1", section: "220kV-I", center_x_m: 32, bus_y_m: 55, gantry_y_m: 35, transformer_center_m: [32, 28], label: "1号主变 T1"}
    - {id: "T2", section: "220kV-II", center_x_m: 95, bus_y_m: 55, gantry_y_m: 35, transformer_center_m: [95, 28], label: "2号主变 T2"}
  bus_voltage_transformers:
    - {id: "PT-220-I", section: "220kV-I", center_m: [46, 48], label: "I段CVT/PT"}
    - {id: "PT-220-II", section: "220kV-II", center_m: [81, 48], label: "II段CVT/PT"}
  buildings:
    - {id: "CTRL", bounds_m: [8, 4, 22, 15], label: "主控通信楼"}
    - {id: "MVSWGR", bounds_m: [108, 4, 138, 15], label: "35/10kV配电楼\n含T10与SVG区域"}
  section_marks:
    - {id: "A-A", axis: "y", coordinate_m: 18, range_m: [28, 85], label: "线路间隔断面 A-A"}
    - {id: "B-B", axis: "y", coordinate_m: 32, range_m: [5, 60], label: "主变间隔断面 B-B"}
  notes:
    - "本图按A1、1:200绘制，北向上；220kV线路向西北出线。"
    - "220kV采用户外AIS分相中型布置，单母线分段；分段断路器正常断开。"
    - "母线相间距4.0m、间隔几何和设备轮廓为课程设计值；安全净距不得小于表列A1/A2/B1/B2/C/D。"
    - "L3及其间隔为远期预留；35/10kV采用室内开关柜，在配电楼内布置。"
    - "精确基础、端子方向、设备外形、爬距和运输转弯半径待厂家图覆盖；电气净距施工前按DL/T 5352-2018正文复核。"

sections:
  drawing_id: "SEC-220-01"
  drawing_title: "220kV户外AIS典型间隔断面图"
  sheet: {format: "A1", orientation: "landscape", width: 841, height: 594, scale: 100, scale_label: "1:100"}
  panels:
    - id: "A-A"
      title: "线路间隔断面 A-A"
      paper_origin_mm: [50, 110]
      width_m: 34
      ground_elevation_m: 0
      equipment_sequence:
        - {id: "BUS-SUPPORT", kind: "bus_support", x_m: 2, terminal_elevation_m: 9.0, label: "管形母线"}
        - {id: "DS-BUS", kind: "disconnector", x_m: 6, terminal_elevation_m: 6.0, label: "母线侧隔离开关"}
        - {id: "CB", kind: "circuit_breaker", x_m: 10, terminal_elevation_m: 5.5, label: "SF6断路器"}
        - {id: "CT", kind: "current_transformer", x_m: 14, terminal_elevation_m: 5.0, label: "电流互感器"}
        - {id: "DS-LINE", kind: "disconnector", x_m: 18, terminal_elevation_m: 6.0, label: "线路侧隔离开关"}
        - {id: "CVT", kind: "cvt", x_m: 22, terminal_elevation_m: 5.2, label: "CVT"}
        - {id: "LA", kind: "surge_arrester", x_m: 25, terminal_elevation_m: 5.0, label: "避雷器"}
        - {id: "LINE-GANTRY", kind: "line_gantry", x_m: 31, terminal_elevation_m: 14.5, label: "出线构架"}
    - id: "B-B"
      title: "主变间隔断面 B-B"
      paper_origin_mm: [430, 110]
      width_m: 34
      ground_elevation_m: 0
      equipment_sequence:
        - {id: "BUS-SUPPORT", kind: "bus_support", x_m: 2, terminal_elevation_m: 9.0, label: "管形母线"}
        - {id: "DS-BUS", kind: "disconnector", x_m: 6, terminal_elevation_m: 6.0, label: "母线侧隔离开关"}
        - {id: "CB", kind: "circuit_breaker", x_m: 10, terminal_elevation_m: 5.5, label: "SF6断路器"}
        - {id: "CT", kind: "current_transformer", x_m: 14, terminal_elevation_m: 5.0, label: "电流互感器"}
        - {id: "LA", kind: "surge_arrester", x_m: 18, terminal_elevation_m: 5.0, label: "避雷器"}
        - {id: "TX-GANTRY", kind: "transformer_gantry", x_m: 22, terminal_elevation_m: 11.5, label: "主变构架"}
        - {id: "T1", kind: "main_transformer", x_m: 29, terminal_elevation_m: 7.5, label: "180MVA主变"}
  notes:
    - "断面标高以场地±0.000为基准；尺寸单位为m，电气净距表单位为mm。"
    - "无遮栏裸导体对地C≥4.30m；本图最低主要带电端子标高5.00m。"
    - "相间距采用4.00m，分别大于A2=2.00m与课程检修布置要求。"
    - "设备高度与占位为课程几何假设，正式工程必须由厂家外形图、端子荷载和基础图覆盖。"
    - "课程设计假设：海拔≤1000m、污秽d级；超过1000m或污区更严时重新校核绝缘与净距。"
    - "净距表采用课程第七章表7-2的220J列；正式工程或施工前必须按DL/T 5352-2018正文复核。"
