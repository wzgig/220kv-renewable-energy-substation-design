schema_version: 1
standard_id: "switchyard_a1_v1"
description: "220kV户外AIS平面与断面课程设计制图标准"

units: "mm"
drawing_space: "modelspace"
lineweight_policy: "by_layer"
plot_color_policy: "monochrome_ctb"
global_linetype_scale: 1.0

sheet_defaults:
  format: "A1"
  orientation: "landscape"
  width: 841
  height: 594
  frame_bounds: [25, 10, 831, 584]
  title_block_bounds: [651, 10, 831, 66]
  working_area_bounds: [35, 72, 821, 574]

linetypes:
  CONTINUOUS: {source: "builtin"}
  CENTER:
    source: "custom"
    description: "中心线"
    pattern_mm: [12.0, -3.0, 2.0, -3.0]
  RESERVED:
    source: "custom"
    description: "预留设施"
    pattern_mm: [6.0, -3.0]

layers:
  C-BOUNDARY: {purpose: "站区边界", aci_color: 7, linetype: "CONTINUOUS", lineweight_mm: 0.50, plot: true}
  C-FENCE: {purpose: "围墙与围栏", aci_color: 7, linetype: "CONTINUOUS", lineweight_mm: 0.35, plot: true}
  C-ROAD: {purpose: "道路与检修通道", aci_color: 8, linetype: "CONTINUOUS", lineweight_mm: 0.25, plot: true}
  C-BUS: {purpose: "220kV三相母线", aci_color: 1, linetype: "CONTINUOUS", lineweight_mm: 0.70, plot: true}
  C-CONDUCTOR: {purpose: "一次导线", aci_color: 7, linetype: "CONTINUOUS", lineweight_mm: 0.35, plot: true}
  C-EQUIPMENT: {purpose: "一次设备外形", aci_color: 7, linetype: "CONTINUOUS", lineweight_mm: 0.35, plot: true}
  C-STRUCTURE: {purpose: "构架与支架", aci_color: 6, linetype: "CONTINUOUS", lineweight_mm: 0.35, plot: true}
  C-FOUNDATION: {purpose: "设备基础", aci_color: 8, linetype: "CONTINUOUS", lineweight_mm: 0.25, plot: true}
  C-BUILDING: {purpose: "建筑物", aci_color: 3, linetype: "CONTINUOUS", lineweight_mm: 0.40, plot: true}
  C-CENTER: {purpose: "中心线和剖切线", aci_color: 4, linetype: "CENTER", lineweight_mm: 0.18, plot: true}
  C-DIM: {purpose: "尺寸与标高", aci_color: 2, linetype: "CONTINUOUS", lineweight_mm: 0.18, plot: true}
  C-TEXT: {purpose: "设备编号与普通文字", aci_color: 7, linetype: "CONTINUOUS", lineweight_mm: 0.18, plot: true}
  C-NOTE: {purpose: "设计说明", aci_color: 7, linetype: "CONTINUOUS", lineweight_mm: 0.18, plot: true}
  C-RESERVED: {purpose: "预留间隔", aci_color: 8, linetype: "RESERVED", lineweight_mm: 0.25, plot: true}
  C-FRAME: {purpose: "图框", aci_color: 7, linetype: "CONTINUOUS", lineweight_mm: 0.50, plot: true}
  C-TITLE: {purpose: "标题栏", aci_color: 7, linetype: "CONTINUOUS", lineweight_mm: 0.25, plot: true}
  C-NOPLOT-GUIDE: {purpose: "辅助线", aci_color: 9, linetype: "CONTINUOUS", lineweight_mm: 0.09, plot: false}

text_styles:
  HZTXT: {font_file: "txt.shx", bigfont_file: "gbcbig.shx", width_factor: 1.0, oblique_angle_deg: 0}
  LATIN: {font_file: "arial.ttf", width_factor: 1.0, oblique_angle_deg: 0}

text_heights_mm:
  body: 3.5
  small: 2.5
  dimension: 2.5
  section_title: 5.0
  drawing_title: 7.0
