name: Project health

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install project dependencies
        run: python -m pip install -r requirements.txt

      - name: Run repository health checks
        shell: pwsh
        run: ./scripts/project_health_check.ps1 -Ci

      - name: Run calculation tests
        run: python -m unittest discover -s tests -v

      - name: Regenerate calculation outputs
        run: |
          python -m calculations.load_and_transformers.calculate
          python -m calculations.short_circuit.calculate
          python -m calculations.equipment_selection.calculate

      - name: Regenerate single-line DXF
        run: >-
          python drawings/scripts/generate_single_line.py
          --output tmp/ci_single_line_a1.dxf
          --verify-against drawings/source/single_line_a1.dxf

      - name: Regenerate switchyard DXFs
        run: >-
          python drawings/scripts/generate_switchyard_drawings.py
          --plan-output tmp/ci_switchyard_plan_a1.dxf
          --section-output tmp/ci_switchyard_section_a1.dxf
          --detail-output tmp/ci_switchyard_line_bay_detail_a1.dxf
          --verify-against
          drawings/source/switchyard_plan_a1.dxf
          drawings/source/switchyard_section_a1.dxf
          drawings/source/switchyard_line_bay_detail_a1.dxf

      - name: Verify generated results are committed
        run: >-
          git diff --exit-code --
          calculations/results
