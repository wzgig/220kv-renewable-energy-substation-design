name: Project health

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install calculation dependencies
        run: python -m pip install -r requirements.txt

      - name: Run repository health checks
        shell: pwsh
        run: ./scripts/project_health_check.ps1 -Ci

      - name: Run calculation tests
        run: python -m unittest discover -s tests -v

      - name: Regenerate calculation outputs
        run: |
          python -m calculations.load_and_transformers.calculate
          python -m calculations.short_circuit.calculate
          python -m calculations.equipment_selection.calculate

      - name: Verify generated results are committed
        run: git diff --exit-code -- calculations/results
